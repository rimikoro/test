name: Run Python test

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 0:00 UTC に実行
  workflow_dispatch:     # 手動実行も可能

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: pip install module
        run: pip install requests

      - name: Run script
        run: python test.py
